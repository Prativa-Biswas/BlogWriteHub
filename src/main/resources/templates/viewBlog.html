<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BlogHub</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>

<body style="background-color: #eee;">
<nav class="navbar bg-dark border-bottom border-body navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Blog Written Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">All Post</a>
        </li>    
      </ul>
         <a class="btn btn-primary px-2 mx-2 "  href="/signUp">Register</a>     
         <a class="btn btn-danger " href="/login">Login</a>
      
      
    </div>
  </div>
</nav>

<section class="h-100 gradient-form mt-4" >

<div class="container mt-3">

	<div class="card mb-3"  style="width: 55rem;" th:object="${responseBody}">
	       <div class="card-header">
		    <h3><span th:text="*{title}"></span></h3>
		    <h5 ><span th:text="*{shortDesc}"></span></h5>
		    
		  </div>
		  <div class="card-body">
		    <span th:utext="*{content}"></span>
		    
		  </div>
	  </div >
	  
	  
	  <div >
	  <h4>Comments</h4>
	      <div  class="card border-0"  style="width: 55rem;" th:each="comm: ${comments}">
			  <div class="card-body">
			   <h5><span th:text="${comm.name}"></span></h5>
			    <h6 ><span th:text="${comm.createdOn}"></span></h6>
			    <span th:text="${comm.comment}"></span>		    
			  </div>
	     </div>
	  </div>
	  
	  
	  <div class="card mt-2" style="width: 55rem;">
	          <div class="border  border-primary rounded border-3 p-2 bg-primary-subtle " >
	   <h3 style="text-align:center">Leave a Comment</h3>
		 <div class="row justify-content-center ">
						
						<form th:action="@{/addComment}" th:object="${commentForm}" method="post" class="needs-validation" novalidate>
						  
						  <div th:if="${succMsg}" class ="alert alert-success">
						  <span th:text="${succMsg}"> </span>
						  </div>
						  
						  <div th:if="${errMsg}" class ="alert alert-danger">
						  <span th:text="${errMsg}"> </span>
						  </div>	
						 
						 <span><input  type="hidden" th:field="*{blogId}"></span>
						  					
						  
						 <!--  Name -->						  
						  <div class="mb-2">
							  <label for="nameId" class="form-label">Enter Name</label>						  
							  <input type="text" class="form-control" id="nameId" th:field="*{name}"   
							     placeholder="Enter Your Name" required> 
							     
							     <div class="invalid-feedback">
								  Name  is required
								</div>	
							  							 
						 </div>
													  
						  <!-- Email -->
						  <div class="mb-3">
							    <label for="emailId" class="form-label">Enter Email</label>
							    <input type="email" class="form-control" id="emailId" th:field="*{email}"  placeholder="Enter mail" required>								
						     
						     <div class="invalid-feedback">
								  Email is Required
								</div>							 
						  </div>
						  
						  <!-- Comment -->
						  <div class="mb-2">
							    <label for="commentId" class="form-label">Comment</label>
							        <textarea class="form-control" id="commentId" th:field="*{commentContent}" placeholder="Enter Comment"  required></textarea>
							       <div class="invalid-feedback">
								     Write Comment
								</div>	
								
						  </div>
						  
						  <!-- button -->
						  <div class="d-flex align-items-center justify-content-center pb-2">
						  			  <button type="submit" class="btn btn-primary">Sumbit</button>	
						  			  					    
						  </div>
						  
						</form>
		  </div>
	  </div>  
	  </div>
	  
	  
	  
</div>

</section>

<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>
  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

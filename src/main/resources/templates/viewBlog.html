<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BlogHub</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>

<body style="background-color: #eee;">
<nav class="navbar bg-dark border-bottom border-body navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Blog Written Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">All Post</a>
        </li>    
      </ul>
         <a class="btn btn-primary px-2 mx-2 "  href="/signUp">Register</a>     
         <a class="btn btn-danger " href="/login">Login</a>
      
      
    </div>
  </div>
</nav>

<section class="h-100 gradient-form mt-4" >

<div class="container mt-3">

	<div class="card mb-3"  style="width: 55rem;" th:object="${responseBody}">
	       <div class="card-header">
		    <h3><span th:text="*{title}"></span></h3>
		    <h5 ><span th:text="*{shortDesc}"></span></h5>
		    
		  </div>
		  <div class="card-body">
		    <span th:utext="*{content}"></span>
		    
		  </div>
	  </div>
</div>
  

</section>
  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

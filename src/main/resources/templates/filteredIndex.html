<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BlogHub</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body>
<div th:fragment="blogList">
	<div class="card mb-3"  style="width: 55rem;" th:each="response: ${responseForm}" >
	       <div class="card-header">
		    <h4><a th:href="@{/readBlog(blogId=${response.blogId})}" class="text-decoration-none"><span th:text="${response.title}"></span></a></h4>
		    <h5 class="card-title"><span th:text="${response.creationDate}"></span></h5>
		    
		  </div>
		  <div class="card-body">
		    <p class="card-text"><span th:text="${response.shortDesc}"></span>...<a th:href="@{/readBlog(blogId=${response.blogId})}" >Read More</a></p>
		    
		  </div>
	  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

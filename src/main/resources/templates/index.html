<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BlogHub</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="/webjars/jquery/3.7.1/jquery.min.js"></script>

<script >
  $(document).ready(function(){
	  $("#searchBox").on("keyup", function(){
		  let key = $(this).val();
		  if (key.length === 0) {
		        $("#filterDiv").html("");
		        $("#unfilteredDiv").show();
		        return;}
		  
		  $.ajax({
			  type:"GET",
			  url:"searchBlog",
			  data:{ keyword:key },
			  success : function(result){
                    $("#unfilteredDiv").hide();
                    $("#filterDiv").html(result);
                    
			  }
			  
		  });
		  
	  });
	  
  });

</script>



</head>
<body>

<body style="background-color: #eee;">
<nav class="navbar bg-dark border-bottom border-body navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Blog Written Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">All Post</a>
        </li>    
      </ul>
      <div class="input-group input-group-sm" style="width: 400px;" data-bs-theme="light">
    	<input type="search" class="form-control" placeholder="Search Blog" id="searchBox">
    
	    <span class="input-group-text">
	        <i class="bi bi-search"></i>
	    </span>
</div>
         <a class="btn btn-primary px-2 mx-2 "  href="/signUp">Register</a>     
         <a class="btn btn-danger " href="/login">Login</a>
      
      
    </div>
  </div>
</nav>

<section class="h-100 gradient-form mt-4" >

<div class="container mt-3">
      
      <div id="filterDiv">
      </div>
      
		<div id="unfilteredDiv">
				<div class="card mb-3"  style="width: 55rem;" th:each="response: ${responseForm}" >
				       <div class="card-header">
					    <h4><a th:href="@{/readBlog(blogId=${response.blogId})}" class="text-decoration-none"><span th:text="${response.title}"></span></a></h4>
					    <h5 class="card-title"><span th:text="${response.creationDate}"></span></h5>
					    
					  </div>
					  <div class="card-body">
					    <p class="card-text"><span th:text="${response.shortDesc}"></span>...<a th:href="@{/readBlog(blogId=${response.blogId})}" >Read More</a></p>
					    
					  </div>
				  </div>                             
   		 </div>
	
</div>
  

</section>
  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

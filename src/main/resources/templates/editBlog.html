<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>BlogHub</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body style="background-color: #eee;">
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Blog Written Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/dashboard">Post</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/addpost">New Post</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/comments">Comments</a>
        </li>     
      </ul>

        <a  href="/logout" class="btn btn-danger" type="submit">Logout</a>

    </div>
  </div>
</nav>

<section class="h-100 gradient-form" >
  
<div class="container mt-3  col-md-10">    
     
	  <div class="border  border-primary rounded border-3 p-2 bg-primary-subtle " >
	   <h3 style="text-align:center">Create New Post</h3>
		 <div class="row justify-content-center ">
						
						<form th:action="@{/editBlog}" th:object="${editForm}" method="post" class="needs-validation" novalidate>
						  
						  <div th:if="${succMsg}" class ="alert alert-success">
						  <span th:text="${succMsg}"> </span>
						  </div>
						  
						  <div th:if="${errMsg}" class ="alert alert-danger">
						  <span th:text="${errMsg}"> </span>
						  </div>						
						  
						  <span> 			
						  		  <input type="hidden" class="form-control" id="bloId" th:field="*{blogId}" /> 
						  </span>
						  
						  <!-- title -->
						  <div class="mb-2">
							  <label for="titleId" class="form-label">Title</label>						  
							  <input type="text" class="form-control" id="titleId" th:field="*{blogTitle}"   
							     placeholder="Enter Blog Title" required> 
							     
							     <div class="invalid-feedback">
								  Blog Title is required
								</div>	
							  							 
						 </div>
													  
						  <!-- Short Description -->
						  <div class="mb-3">
							    <label for="descId" class="form-label">Short Description</label>
							    <input type="text" class="form-control" id="descId" th:field="*{shortDescription}"  placeholder="Enter Blog short Description" required>								
						     
						     <div class="invalid-feedback">
								  Blog Short Description is required
								</div>							 
						  </div>
						  
						  <!-- Content -->
						  <div class="mb-2">
							    <label for="contentId" class="form-label">Content</label>
							        <textarea class="form-control" id="contentId" th:field="*{blogContent}"  required></textarea>
							       <div class="invalid-feedback">
								     Write something in Blog content
								</div>	
								
						  </div>
						  
						  <!-- button -->
						  <div class="d-flex align-items-center justify-content-center pb-2">
						  			  <button type="submit" class="btn btn-primary">Update</button>	
						  			  					    
						  </div>
						  
						</form>
		  </div>
	  </div>	   
				   
</div>				


</section>

<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>


<script src="https://cdn.ckeditor.com/4.21.0/full/ckeditor.js"></script>

 <script>
CKEDITOR.config.versionCheck = false;

CKEDITOR.replace('contentId', {
    height: 100,
    toolbar: [
        { name: 'document', items: ['Source'] },
        { name: 'clipboard', items: ['Cut', 'Copy', 'Paste'] },
        { name: 'editing', items: ['Find', 'Replace'] },
        { name: 'basicstyles', items: ['Bold', 'Italic', 'Underline', 'Strike'] },
        { name: 'paragraph', items: ['NumberedList', 'BulletedList', 'Blockquote'] },
        { name: 'links', items: ['Link', 'Unlink'] },
        { name: 'insert', items: ['Image', 'Table'] },
        { name: 'styles', items: ['Styles', 'Format', 'Font', 'FontSize'] },
        { name: 'colors', items: ['TextColor', 'BGColor'] }
    ]
});

// ✅ attach AFTER instance is ready (important)
CKEDITOR.on('instanceReady', function (event) {

    var editor = event.editor;

    // set placeholder initially
    if (editor.getData().trim() === '') {
        editor.setData('<p style="color:#aaa;">Enter Blog Content...</p>');
    }

    // remove on focus
    editor.on('focus', function () {
        if (editor.getData().includes('Enter Blog Content')) {
            editor.setData('');
        }
    });

    // restore if empty
    editor.on('blur', function () {
        if (editor.getData().trim() === '') {
            editor.setData('<p style="color:#aaa;">Enter Blog Content...</p>');
        }
    });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
